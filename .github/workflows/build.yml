name: Build binaries

on:
  push:
    branches: [master, main, dev/go-rewrite]
    tags: ["v*"]
  pull_request:
    branches: [master, main, dev/go-rewrite]
  workflow_dispatch:

jobs:
  build-python-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller app.spec --noconfirm

      - name: Rename executable
        run: mv dist/WhatsAppInviter.exe dist/WhatsAppInviter-python-windows.exe

      - name: Upload Python Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppInviter-python-windows
          path: apps/python/dist/WhatsAppInviter-python-windows.exe

  build-python-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app bundle
        run: pyinstaller app.spec --noconfirm

      - name: Zip .app bundle
        run: ditto -c -k --keepParent dist/WhatsAppInviter.app dist/WhatsAppInviter-python-macOS.zip

      - name: Upload Python macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppInviter-python-macos
          path: apps/python/dist/WhatsAppInviter-python-macOS.zip

  build-go-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/go/go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/go/frontend

      - name: Build Wails app
        run: wails build -clean

      - name: Upload Go Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppInviter-go-windows
          path: apps/go/build/bin/WhatsAppInviter.exe

  build-go-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/go/go.sum

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: npm install
        working-directory: apps/go/frontend

      - name: Build Wails app
        run: wails build -clean

      - name: Zip .app bundle
        run: ditto -c -k --keepParent build/bin/WhatsAppInviter.app build/bin/WhatsAppInviter-go-macOS.zip

      - name: Upload Go macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatsAppInviter-go-macos
          path: apps/go/build/bin/WhatsAppInviter-go-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-python-windows, build-python-macos, build-go-windows, build-go-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Python Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatsAppInviter-python-windows
          path: artifacts

      - name: Download Python macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatsAppInviter-python-macos
          path: artifacts

      - name: Download Go Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatsAppInviter-go-windows
          path: artifacts

      - name: Download Go macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: WhatsAppInviter-go-macos
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/WhatsAppInviter-python-windows.exe
            artifacts/WhatsAppInviter-python-macOS.zip
            artifacts/WhatsAppInviter.exe
            artifacts/WhatsAppInviter-go-macOS.zip
